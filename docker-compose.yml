services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: speedler
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-SpeedlerDB2024}
      POSTGRES_DB: speedler_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U speedler"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://speedler:${POSTGRES_PASSWORD:-SpeedlerDB2024}@db:5432/speedler_db?schema=public
      NEXTAUTH_URL: https://demo2.5tcgroup.com
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-changeme-generate-with-openssl}
      NEXT_PUBLIC_SITE_URL: https://demo2.5tcgroup.com
      NEXT_PUBLIC_SITE_NAME: Speedler
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
      - n8n_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.speedler.rule=Host(`demo2.5tcgroup.com`)"
      - "traefik.http.routers.speedler.entrypoints=websecure"
      - "traefik.http.routers.speedler.tls.certresolver=mytlschallenge"
      - "traefik.http.services.speedler.loadbalancer.server.port=3000"

  cron:
    image: alpine:3.19
    restart: unless-stopped
    depends_on:
      - app
    environment:
      CRON_SECRET: ${CRON_SECRET:-}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache curl
        echo "*/15 * * * * curl -sf -X POST -H \"Authorization: Bearer $$CRON_SECRET\" http://app:3000/api/cron/supplier-sync > /proc/1/fd/1 2>&1" | crontab -
        crond -f -l 2
    networks:
      - default

volumes:
  postgres-data:

networks:
  n8n_default:
    external: true

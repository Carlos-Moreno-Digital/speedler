<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configurador PC - Speedler</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#3a3a3a;background:#fff}
.header{border-bottom:1px solid #ebebeb;padding:1rem 0}
.header-inner{max-width:1200px;margin:0 auto;padding:0 22px;display:flex;align-items:center;justify-content:space-between}
.header a{color:#3a3a3a;text-decoration:none;font-weight:600;font-size:1.1rem}
.header nav a{margin-left:1.5rem;font-weight:400;font-size:.9rem}
.header nav a:hover{color:#058c8c}
.container{max-width:1200px;margin:0 auto;padding:2rem 22px}
h1{font-size:1.8rem;font-weight:700;margin-bottom:.5rem}
.subtitle{color:#6b7280;margin-bottom:2rem}
.layout{display:grid;grid-template-columns:1fr 350px;gap:2rem}
@media(max-width:768px){.layout{grid-template-columns:1fr}}
.steps{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1.5rem}
.step-btn{padding:.5rem 1rem;border:1px solid #e5e7eb;border-radius:3px;background:#fff;cursor:pointer;font-size:.85rem;transition:all .2s}
.step-btn:hover{border-color:#058c8c}
.step-btn.active{background:#058c8c;color:#fff;border-color:#058c8c}
.step-btn.done{background:#e6f5f5;border-color:#058c8c;color:#058c8c}
.component-list{border:1px solid #e5e7eb;border-radius:4px;max-height:400px;overflow-y:auto}
.component-item{padding:.75rem 1rem;border-bottom:1px solid #f3f4f6;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:background .15s}
.component-item:hover{background:#f9fafb}
.component-item.selected{background:#e6f5f5;border-left:3px solid #058c8c}
.component-item:last-child{border-bottom:none}
.comp-name{font-size:.9rem;font-weight:500;flex:1}
.comp-price{font-weight:600;color:#058c8c;white-space:nowrap;margin-left:1rem}
.comp-stock{font-size:.75rem;color:#6b7280;margin-left:.5rem}
.no-items{padding:2rem;text-align:center;color:#6b7280}
.sidebar{position:sticky;top:1rem}
.summary{border:1px solid #e5e7eb;border-radius:4px;padding:1.25rem}
.summary h2{font-size:1.1rem;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid #e5e7eb}
.summary-item{display:flex;justify-content:space-between;padding:.5rem 0;font-size:.85rem;border-bottom:1px solid #f3f4f6}
.summary-item .label{color:#6b7280}
.summary-item .value{font-weight:500}
.summary-total{display:flex;justify-content:space-between;padding:1rem 0 .5rem;font-size:1.1rem;font-weight:700;border-top:2px solid #e5e7eb;margin-top:.5rem}
.btn-cart{width:100%;padding:.75rem;background:#058c8c;color:#fff;border:none;border-radius:3px;font-size:1rem;font-weight:600;cursor:pointer;margin-top:1rem;text-transform:uppercase;letter-spacing:.05em}
.btn-cart:hover{background:#046d6d}
.btn-cart:disabled{background:#d1d5db;cursor:not-allowed}
.warning{background:#fef3c7;border:1px solid #f59e0b;border-radius:4px;padding:.75rem;margin-top:1rem;font-size:.85rem;color:#92400e}
.loading{text-align:center;padding:2rem;color:#6b7280}
.footer{border-top:1px solid #ebebeb;padding:2rem 0;margin-top:3rem;text-align:center;color:#6b7280;font-size:.85rem}
</style>
</head>
<body>
<div class="header"><div class="header-inner">
<a href="/">Speedler</a>
<nav><a href="/">Inicio</a><a href="/search">Tienda</a><a href="/cart">Carrito</a></nav>
</div></div>

<div class="container">
<h1>Configurador de PC</h1>
<p class="subtitle">Monta tu equipo eligiendo componentes compatibles. Precio actualizado en tiempo real.</p>

<div class="layout">
<div class="main">
<div class="steps" id="steps"></div>
<div id="component-list" class="component-list"><div class="loading">Cargando componentes...</div></div>
</div>
<div class="sidebar">
<div class="summary">
<h2>Tu configuración</h2>
<div id="summary-items"></div>
<div class="summary-total"><span>TOTAL</span><span id="total-price">0,00 €</span></div>
<button class="btn-cart" id="btn-add" disabled onclick="addAllToCart()">AÑADIR TODO AL CARRITO</button>
<div id="warnings"></div>
</div>
</div>
</div>
</div>

<div class="footer">© 2026 Speedler. Todos los derechos reservados.</div>

<script>
const CATEGORIES = [
  {id:'cpu', name:'Procesador', slug:'procesadores', required:true},
  {id:'mobo', name:'Placa Base', slug:'placas-base', required:true},
  {id:'ram', name:'Memoria RAM', slug:'memorias', required:true},
  {id:'gpu', name:'Tarjeta Gráfica', slug:'tarjetas-graficas-edicion-de-video', required:false},
  {id:'storage', name:'Almacenamiento', slug:'ssd', required:true},
  {id:'psu', name:'Fuente Alimentación', slug:'fuentes-alimentacion', required:true},
  {id:'case', name:'Caja / Torre', slug:'cajas-cpu', required:true},
  {id:'cooler', name:'Refrigeración', slug:'ventiladores-cpu', required:false}
];

let activeStep = 0;
let selected = {};
let productCache = {};

function formatPrice(v) {
  return new Intl.NumberFormat('es-ES',{style:'currency',currency:'EUR'}).format(v);
}

function renderSteps() {
  const el = document.getElementById('steps');
  el.innerHTML = CATEGORIES.map((c,i) => {
    let cls = 'step-btn';
    if (i === activeStep) cls += ' active';
    else if (selected[c.id]) cls += ' done';
    return `<button class="${cls}" onclick="setStep(${i})">${c.name}${c.required?'*':''}</button>`;
  }).join('');
}

function setStep(i) {
  activeStep = i;
  renderSteps();
  loadProducts(CATEGORIES[i]);
}

async function loadProducts(cat) {
  const list = document.getElementById('component-list');
  if (productCache[cat.slug]) {
    renderProducts(productCache[cat.slug], cat);
    return;
  }
  list.innerHTML = '<div class="loading">Cargando componentes...</div>';
  try {
    const q = `{ products(filters:[{key:"category",operation:"in",value:"${cat.slug}"}]) { items { productId name sku price { regular { value text } } inventory { qty isInStock } } } }`;
    const res = await fetch('/api/graphql', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({query: q})
    });
    const data = await res.json();
    const items = data?.data?.products?.items || [];
    productCache[cat.slug] = items;
    renderProducts(items, cat);
  } catch(e) {
    list.innerHTML = '<div class="no-items">Error cargando componentes</div>';
  }
}

function renderProducts(items, cat) {
  const list = document.getElementById('component-list');
  if (items.length === 0) {
    list.innerHTML = '<div class="no-items">No hay componentes disponibles en esta categoría</div>';
    return;
  }
  const inStock = items.filter(p => p.inventory?.isInStock);
  const sorted = inStock.sort((a,b) => (a.price?.regular?.value||0) - (b.price?.regular?.value||0));
  list.innerHTML = sorted.map(p => {
    const sel = selected[cat.id]?.sku === p.sku ? ' selected' : '';
    const price = p.price?.regular?.value || 0;
    const qty = p.inventory?.qty || 0;
    return `<div class="component-item${sel}" onclick="selectComponent('${cat.id}','${p.sku}','${p.name.replace(/'/g,"\\'")}',${price})">
      <span class="comp-name">${p.name}</span>
      <span class="comp-price">${formatPrice(price)}</span>
      <span class="comp-stock">(${qty} uds)</span>
    </div>`;
  }).join('');
}

function selectComponent(catId, sku, name, price) {
  selected[catId] = {sku, name, price};
  renderSteps();
  loadProducts(CATEGORIES[activeStep]);
  renderSummary();
}

function renderSummary() {
  const el = document.getElementById('summary-items');
  let total = 0;
  let html = '';
  for (const cat of CATEGORIES) {
    const s = selected[cat.id];
    if (s) {
      total += s.price;
      html += `<div class="summary-item"><span class="label">${cat.name}</span><span class="value">${formatPrice(s.price)}</span></div>`;
    } else {
      html += `<div class="summary-item"><span class="label" style="opacity:.4">${cat.name} ${cat.required?'(requerido)':'(opcional)'}</span><span class="value">-</span></div>`;
    }
  }
  el.innerHTML = html;
  document.getElementById('total-price').textContent = formatPrice(total);

  // Check required
  const allRequired = CATEGORIES.filter(c=>c.required).every(c=>selected[c.id]);
  document.getElementById('btn-add').disabled = !allRequired;

  // Warnings
  let warnings = [];
  if (!selected.cpu && !selected.mobo) warnings.push('Selecciona al menos un procesador y una placa base.');
  const w = document.getElementById('warnings');
  w.innerHTML = warnings.length ? `<div class="warning">${warnings.join('<br>')}</div>` : '';
}

async function addAllToCart() {
  const btn = document.getElementById('btn-add');
  btn.disabled = true;
  btn.textContent = 'AÑADIENDO...';
  let added = 0;
  for (const cat of CATEGORIES) {
    const s = selected[cat.id];
    if (!s) continue;
    try {
      await fetch('/api/cart/mine/items', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({sku: s.sku, qty: 1})
      });
      added++;
    } catch(e) {}
  }
  btn.textContent = `${added} COMPONENTES AÑADIDOS`;
  setTimeout(() => {
    btn.textContent = 'AÑADIR TODO AL CARRITO';
    btn.disabled = false;
  }, 3000);
}

// Init
renderSteps();
renderSummary();
loadProducts(CATEGORIES[0]);
</script>
</body>
</html>

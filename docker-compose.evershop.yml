services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - evershop-pgdata:/var/lib/postgresql/data
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.evershop
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: postgres
      SUPPRESS_NO_CONFIG_WARNING: "true"
    volumes:
      - ./config:/app/config
      - ./extensions:/app/extensions
      - ./import-products.cjs:/app/import-products.cjs
      - ./setup-spain.cjs:/app/setup-spain.cjs
      - ./setup-homepage.cjs:/app/setup-homepage.cjs
      - ./fix-everything.cjs:/app/fix-everything.cjs
      - ./ProductosPropios.csv:/app/ProductosPropios.csv
      - ./public/logo.png:/app/media/logo.png
      - evershop-media:/app/media
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
      - n8n_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.speedler.rule=Host(`demo2.5tcgroup.com`)"
      - "traefik.http.routers.speedler.entrypoints=websecure"
      - "traefik.http.routers.speedler.tls.certresolver=mytlschallenge"
      - "traefik.http.services.speedler.loadbalancer.server.port=3000"

volumes:
  evershop-pgdata:
  evershop-media:

networks:
  n8n_default:
    external: true

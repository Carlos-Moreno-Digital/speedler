services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: speedler
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-SpeedlerDB2024}
      POSTGRES_DB: speedler_evershop
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U speedler"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: evershop/evershop:latest
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: speedler
      DB_PASSWORD: ${POSTGRES_PASSWORD:-SpeedlerDB2024}
      DB_NAME: speedler_evershop
    volumes:
      - ./config.json:/app/config.json:ro
      - ./media:/app/media
      - ./extensions:/app/extensions
      - ./themes:/app/themes
      - ./translations:/app/translations
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
      - n8n_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.speedler.rule=Host(`demo2.5tcgroup.com`)"
      - "traefik.http.routers.speedler.entrypoints=websecure"
      - "traefik.http.routers.speedler.tls.certresolver=mytlschallenge"
      - "traefik.http.services.speedler.loadbalancer.server.port=3000"

volumes:
  postgres-data:

networks:
  n8n_default:
    external: true
